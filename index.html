<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title> </title>
  <meta name="description" content="极简旅行照片记录。">
  <style>
    :root {
      color-scheme: light;
      --ink: #161616;
      --muted: #747474;
      --line: #e8e8e8;
      --paper: #ffffff;
      --soft: rgba(255, 255, 255, .78);
      --shadow: 0 26px 76px rgba(0, 0, 0, .16);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: auto;
      scrollbar-width: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      display: none;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--paper);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    button {
      font: inherit;
      color: inherit;
    }

    .ambient {
      position: fixed;
      inset: -14vh -14vw;
      z-index: -2;
      background-image: var(--ambient-image);
      background-position: center;
      background-size: cover;
      filter: blur(22px) saturate(.85);
      opacity: .1;
      transform: scale(1.08);
      transition: background-image .4s ease, opacity .25s ease;
    }

    .ambient::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, .82);
    }

    .overview {
      position: relative;
      height: 100svh;
      min-height: 560px;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .stage {
      width: 100%;
      overflow-x: auto;
      overflow-y: visible;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
    }

    .stage::-webkit-scrollbar {
      display: none;
    }

    .rail {
      width: max-content;
      min-height: min(640px, 84svh);
      display: flex;
      align-items: center;
      gap: 80px;
      padding: 72px max(24px, calc(50vw - 290px));
    }

    .trip-node {
      --node-opacity: .12;
      --node-scale: .82;
      width: 580px;
      min-height: 430px;
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      grid-template-rows: auto auto auto;
      gap: 18px;
      flex: 0 0 auto;
      opacity: var(--node-opacity);
      transform: scale(var(--node-scale));
      transition: opacity .2s ease, transform .2s ease;
      cursor: pointer;
      will-change: transform, opacity;
    }

    .trip-node:focus-visible {
      outline: 3px solid rgba(0, 0, 0, .22);
      outline-offset: 10px;
      border-radius: 8px;
    }

    .photo-stack {
      position: relative;
      width: 380px;
      height: 264px;
      overflow: visible;
    }

    .photo-frame {
      position: absolute;
      inset: 0;
      margin: 0;
      border: 2px solid #fff;
      border-radius: 8px;
      background: #f5f5f5;
      box-shadow: var(--shadow);
      overflow: hidden;
      transform-origin: 50% 92%;
      transition: transform .42s cubic-bezier(.2, .86, .28, 1), box-shadow .2s ease;
      will-change: transform;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .frame-1 {
      z-index: 1;
      transform: translate(-14px, 9px) rotate(-4deg);
    }

    .frame-2 {
      z-index: 2;
      transform: translate(0, 0) rotate(.5deg);
    }

    .frame-3 {
      z-index: 3;
      transform: translate(14px, 10px) rotate(4deg);
    }

    .trip-node:hover .frame-1,
    .trip-node:focus-visible .frame-1,
    .trip-node.is-focused .frame-1,
    .trip-node.is-selected .frame-1,
    .trip-node.is-hovered .frame-1 {
      transform: translate(-72px, 5px) rotate(-8deg);
    }

    .trip-node:hover .frame-2,
    .trip-node:focus-visible .frame-2,
    .trip-node.is-focused .frame-2,
    .trip-node.is-selected .frame-2,
    .trip-node.is-hovered .frame-2 {
      transform: translate(0, -10px) rotate(0deg);
    }

    .trip-node:hover .frame-3,
    .trip-node:focus-visible .frame-3,
    .trip-node.is-focused .frame-3,
    .trip-node.is-selected .frame-3,
    .trip-node.is-hovered .frame-3 {
      transform: translate(72px, 5px) rotate(8deg);
    }

    .place {
      margin: 0;
      max-width: 92vw;
      font-size: clamp(1.55rem, 3vw, 2.65rem);
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: 0;
      text-align: center;
    }

    .trip-time {
      margin: 0;
      max-width: 92vw;
      color: var(--muted);
      font-size: clamp(.95rem, 1.25vw, 1.08rem);
      line-height: 1.2;
      font-weight: 500;
      letter-spacing: 0;
      text-align: center;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail {
      display: none;
      min-height: 100svh;
      padding: 0;
      background: #fff;
      overflow: hidden;
    }

    .detail.is-visible {
      display: block;
    }

    .detail-inner {
      width: 100%;
      min-height: 100svh;
      margin: 0 auto;
      display: grid;
      grid-template-rows: 14svh 86svh;
      gap: 0;
      opacity: var(--detail-opacity, 1);
      transition: opacity .12s linear;
      will-change: opacity;
    }

    .detail-place {
      width: min(980px, calc(100% - 36px));
      margin: 0 auto;
      font-size: clamp(1.9rem, 3.6vw, 3.8rem);
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: 0;
      display: grid;
      align-items: center;
      justify-items: center;
      text-align: center;
    }

    .photo-track {
      --photo-slot: clamp(280px, 18vw, 350px);
      --photo-visual: min(clamp(440px, 27vw, 520px), calc(100vw - 56px));
      --track-pad-start: max(24px, calc(50vw - var(--photo-slot) / 2));
      --track-pad-end: max(24px, calc(50vw - var(--photo-slot) / 2));
      height: 100%;
      min-height: 0;
      display: flex;
      align-items: stretch;
      gap: clamp(48px, 3.2vw, 68px);
      overflow-x: auto;
      overflow-y: hidden;
      overscroll-behavior-x: contain;
      scroll-snap-type: none;
      scrollbar-width: none;
      padding: 0 var(--track-pad-end) 18px var(--track-pad-start);
      cursor: pointer;
      perspective: 1400px;
      perspective-origin: 50% 45%;
    }

    .photo-track::-webkit-scrollbar {
      display: none;
    }

    .photo-card {
      --card-scale: .42;
      --card-max-width: 220px;
      --card-max-height: 220px;
      --card-layout-width: 220px;
      --card-render-scale: 1;
      --card-tilt: 0deg;
      --card-depth: 0px;
      --card-z: 0;
      flex: 0 0 var(--card-layout-width);
      width: var(--card-layout-width);
      height: 100%;
      min-width: 0;
      min-height: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      scroll-snap-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      overflow: visible;
      z-index: var(--card-z);
      cursor: pointer;
      transition: width .18s cubic-bezier(.2, .86, .28, 1), flex-basis .18s cubic-bezier(.2, .86, .28, 1);
    }

    .photo-track.is-animating .photo-card,
    .photo-track.is-animating .photo-media,
    .photo-track.is-animating .photo-media img,
    .photo-track.is-animating .photo-copy {
      transition: none;
    }

    .photo-media {
      width: var(--card-layout-width);
      height: auto;
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      transform: translateZ(var(--card-depth)) rotateY(var(--card-tilt)) scale(var(--card-render-scale));
      transform-origin: center center;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      will-change: width, transform;
      transition: width .2s cubic-bezier(.2, .86, .28, 1), transform .28s cubic-bezier(.2, .86, .28, 1);
    }

    .photo-media img {
      width: auto;
      height: auto;
      min-height: 0;
      max-width: var(--card-max-width);
      max-height: var(--card-max-height);
      object-fit: contain;
      display: block;
      background: transparent;
      border-radius: 0;
      backface-visibility: hidden;
      transition: max-width .2s cubic-bezier(.2, .86, .28, 1), max-height .2s cubic-bezier(.2, .86, .28, 1);
    }

    .photo-copy {
      width: min(var(--card-layout-width), calc(100vw - 48px));
      justify-self: center;
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      align-content: center;
      justify-items: center;
      gap: 4px;
      padding: 0 12px;
      background: transparent;
      border: 0;
      border-radius: 0;
      text-align: center;
      transition: width .18s cubic-bezier(.2, .86, .28, 1);
    }

    .photo-time {
      color: var(--muted);
      font-size: .95rem;
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .photo-text {
      margin: 0;
      font-size: 1rem;
      line-height: 1.35;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    @media (max-width: 760px) {
      .rail {
        gap: 28px;
        padding-inline: max(9vw, calc(50vw - 41vw));
      }

      .trip-node {
        width: 82vw;
        min-height: 360px;
      }

      .photo-stack {
        width: min(320px, 68vw);
        height: min(230px, 42vw);
      }

      .trip-node:hover .frame-1,
      .trip-node:focus-visible .frame-1,
      .trip-node.is-focused .frame-1,
      .trip-node.is-selected .frame-1,
      .trip-node.is-hovered .frame-1 {
        transform: translate(-44px, 4px) rotate(-8deg);
      }

      .trip-node:hover .frame-3,
      .trip-node:focus-visible .frame-3,
      .trip-node.is-focused .frame-3,
      .trip-node.is-selected .frame-3,
      .trip-node.is-hovered .frame-3 {
        transform: translate(44px, 4px) rotate(8deg);
      }

      .photo-track {
        --photo-slot: 76vw;
        --photo-visual: calc(100vw - 42px);
        gap: 14vw;
        padding: 0 max(12vw, calc(50vw - 38vw)) 18px;
        perspective: 760px;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-x pan-y;
      }

      .photo-card {
        flex-basis: var(--card-layout-width);
        transition: none;
      }

      .photo-media {
        transition: none;
      }

      .photo-media img,
      .photo-copy {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="ambient" id="ambient" aria-hidden="true"></div>
  <main>
    <section class="overview" id="overview" aria-label="旅行地点">
      <div class="stage" id="stage">
        <div class="rail" id="rail"></div>
      </div>
    </section>
    <section class="detail" id="detail" aria-label="照片说明">
      <div class="detail-inner" id="detailInner"></div>
    </section>
  </main>

  <script>
    const fallbackData = {
      trips: [
        {
          place: "北京",
          images: ["assets/photos/beijing.jpg", "assets/photos/beijing-2.jpg", "assets/photos/beijing-3.jpg"],
          photos: [
            { src: "assets/photos/beijing.jpg", time: "2026.05.18", text: "傍晚的水边，光线从柳树枝叶里落下来。" },
            { src: "assets/photos/beijing-2.jpg", time: "2026.05.18", text: "城市里最安静的一段路，适合慢慢走。" },
            { src: "assets/photos/beijing-3.jpg", time: "2026.05.19", text: "离开前回头看了一眼，记住这次短暂停留。" }
          ]
        }
      ]
    };

    const state = {
      trips: [],
      activeIndex: 0,
      selectedIndex: null,
      detailFocusIndex: null,
      detailOpen: false,
      targetScrollLeft: 0,
      detailTargetScrollLeft: 0,
      railFrame: 0,
      detailFrame: 0,
      pageFrame: 0,
      railMotion: "idle",
      railCloseOnDrift: false,
      detailMotion: "idle",
      detailFocusTimer: 0,
      detailClickProgress: 1,
      detailStartVisuals: [],
      detailTicking: false,
      ticking: false,
      openFrame: 0,
      centeringSelected: false,
      mouseX: 0,
      mouseY: 0
    };

    const els = {
      ambient: document.querySelector("#ambient"),
      overview: document.querySelector("#overview"),
      stage: document.querySelector("#stage"),
      rail: document.querySelector("#rail"),
      detail: document.querySelector("#detail"),
      detailInner: document.querySelector("#detailInner")
    };

    const MOTION = {
      tripClickMs: 760,
      photoClickMs: 550,
      wheelFollow: .24,
      settlePx: .55,
      photoTiltDeg: 7,
      photoDepthPx: 22
    };

    function cleanList(value) {
      if (!value) return [];
      if (Array.isArray(value)) return value.filter(Boolean);
      return String(value).split(",").map(item => item.trim()).filter(Boolean);
    }

    function normalizeTrip(trip, index) {
      const images = cleanList(trip.images).length ? cleanList(trip.images) : cleanList(trip.image);
      const safeImages = images.length ? images : ["assets/photos/beijing.jpg"];
      const photos = Array.isArray(trip.photos) && trip.photos.length
        ? trip.photos.map((photo, photoIndex) => ({
          src: photo.src || safeImages[photoIndex % safeImages.length],
          time: photo.time || photo.date || trip.date || "",
          text: photo.text || photo.caption || trip.summary || ""
        }))
        : [0, 1, 2].map(photoIndex => ({
          src: safeImages[photoIndex % safeImages.length],
          time: trip.date || "",
          text: trip.summary || ""
        }));
      const coverImages = images.length ? images : photos.map(photo => photo.src).filter(Boolean);
      const safeCoverImages = coverImages.length ? coverImages : safeImages;
      const timeValues = photos.map(photo => photo.time).filter(Boolean);
      const dateLabel = trip.date || trip.time || (
        timeValues.length
          ? timeValues[0] === timeValues[timeValues.length - 1]
            ? timeValues[0]
            : `${timeValues[0]} - ${timeValues[timeValues.length - 1]}`
          : ""
      );

      return {
        id: trip.id || `trip-${index + 1}`,
        place: trip.place || "未命名地点",
        dateLabel,
        images: [0, 1, 2].map(imageIndex => safeCoverImages[imageIndex % safeCoverImages.length]),
        photos
      };
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clamp01(value) {
      return Math.max(0, Math.min(value, 1));
    }

    function smooth01(value) {
      const t = clamp01(value);
      return t * t * (3 - 2 * t);
    }

    function setStyleVar(node, name, value) {
      if (node.style.getPropertyValue(name) !== value) {
        node.style.setProperty(name, value);
      }
    }

    function renderRail() {
      els.rail.innerHTML = state.trips.map((trip, index) => {
        const frames = trip.images.map((image, imageIndex) => `
          <figure class="photo-frame frame-${imageIndex + 1}">
            <img src="${escapeHtml(image)}" alt="${escapeHtml(trip.place)} ${imageIndex + 1}" loading="${index < 2 ? "eager" : "lazy"}" decoding="async">
          </figure>
        `).join("");

        return `
          <button class="trip-node" type="button" data-index="${index}" aria-current="${index === state.activeIndex}">
            <p class="place">${escapeHtml(trip.place)}</p>
            <div class="photo-stack">${frames}</div>
            <p class="trip-time">${escapeHtml(trip.dateLabel || "")}</p>
          </button>
        `;
      }).join("");

      els.rail.querySelectorAll(".trip-node").forEach(node => {
        node.addEventListener("click", () => selectTrip(Number(node.dataset.index)));
        node.addEventListener("pointerenter", () => node.classList.add("is-hovered"));
        node.addEventListener("pointerleave", () => node.classList.remove("is-hovered"));
      });
    }

    function updateHoveredNode(x, y) {
      const hoveredNode = document.elementFromPoint(x, y)?.closest(".trip-node");
      els.rail.querySelectorAll(".trip-node").forEach(node => {
        node.classList.toggle("is-hovered", node === hoveredNode);
      });
    }

    function renderDetail() {
      const tripIndex = state.selectedIndex ?? state.activeIndex;
      const trip = state.trips[tripIndex];
      els.detail.classList.toggle("is-visible", state.detailOpen && Boolean(trip));
      els.detail.setAttribute("aria-hidden", String(!state.detailOpen || !trip));

      if (!state.detailOpen || !trip) {
        els.detailInner.innerHTML = "";
        return;
      }

      els.detailInner.innerHTML = `
        <h2 class="detail-place">${escapeHtml(trip.place)}</h2>
        <div class="photo-track" aria-label="${escapeHtml(trip.place)}照片">
          ${trip.photos.map((photo, photoIndex) => `
            <article class="photo-card" data-photo-index="${photoIndex}" aria-label="${escapeHtml([trip.place, photo.time].filter(Boolean).join(" "))}">
            <div class="photo-media">
              <img src="${escapeHtml(photo.src)}" alt="${escapeHtml(trip.place)}" loading="lazy" decoding="async">
            </div>
            <div class="photo-copy">
              <span class="photo-time">${escapeHtml(photo.time)}</span>
              <p class="photo-text">${escapeHtml(photo.text)}</p>
            </div>
            </article>
          `).join("")}
        </div>
      `;

      const track = els.detail.querySelector(".photo-track");
      track?.addEventListener("scroll", scheduleDetailCardsUpdate, { passive: true });
      track?.addEventListener("click", event => {
        const card = closestDetailCardToX(track, event.clientX);
        if (card) centerDetailCard(card);
      });
      track?.querySelectorAll("img").forEach(img => {
        if (img.complete) return;
        img.addEventListener("load", updateDetailVisuals, { once: true });
      });
      requestAnimationFrame(updateDetailVisuals);
    }

    function updateDetailProgress() {
      if (!state.detailOpen) {
        els.detail.style.setProperty("--detail-opacity", "1");
        return;
      }

      const detailStart = Math.max(1, els.detail.offsetTop);
      const progress = clamp01(window.scrollY / detailStart);
      const eased = Math.pow(progress, .82);
      els.detail.style.setProperty("--detail-opacity", String(eased));
    }

    function getDetailMotionSettings() {
      const compact = window.matchMedia("(max-width: 760px), (pointer: coarse)").matches;
      return {
        compact,
        minScale: compact ? .74 : .42,
        focusRangeFactor: compact ? .9 : .62,
        tiltDeg: compact ? 2.5 : MOTION.photoTiltDeg,
        depthPx: compact ? 6 : MOTION.photoDepthPx
      };
    }

    function updateDetailCards() {
      const track = els.detail.querySelector(".photo-track");
      if (!track) return;

      const trackRect = track.getBoundingClientRect();
      const centerX = trackRect.left + trackRect.width / 2;
      const settings = getDetailMotionSettings();
      const baseWidth = settings.compact
        ? Math.min(Math.max(window.innerWidth * .76, 260), 430, window.innerWidth - 42)
        : Math.min(Math.max(window.innerWidth * .27, 440), 520, window.innerWidth - 56);
      const baseHeight = settings.compact
        ? Math.max(160, trackRect.height - 76)
        : Math.max(160, trackRect.height - 86);
      const cards = Array.from(track.querySelectorAll(".photo-card"));
      const focusIndex = Number.isInteger(state.detailFocusIndex)
        ? Math.max(0, Math.min(state.detailFocusIndex, cards.length - 1))
        : null;
      const focusRange = Math.max(1, trackRect.width * settings.focusRangeFactor);
      const layoutWidths = [];

      cards.forEach((card, index) => {
        const img = card.querySelector("img");
        const cardRect = card.getBoundingClientRect();
        const cardCenter = cardRect.left + cardRect.width / 2;
        const signedDistance = cardCenter - centerX;
        const distance = Math.abs(signedDistance);
        const manualFocus = clamp01(1 - distance / focusRange);
        const manualSide = Math.max(-1, Math.min(signedDistance / (focusRange * .55), 1));
        let focus = manualFocus;
        let side = manualSide;

        if (focusIndex !== null) {
          const signedSteps = index - focusIndex;
          const stepDistance = Math.abs(signedSteps);
          const lockedFocus = stepDistance === 0 ? 1 : clamp01(1 - stepDistance / 2.35);
          const lockedSide = Math.max(-1, Math.min(signedSteps, 1));
          const blend = clamp01(state.detailClickProgress);
          const startVisual = state.detailStartVisuals[index];
          const startFocus = startVisual ? startVisual.focus : manualFocus;
          const startSide = startVisual ? startVisual.side : manualSide;
          focus = startFocus + (lockedFocus - startFocus) * blend;
          side = startSide + (lockedSide - startSide) * blend;
        }

        const scale = settings.minScale + focus * (1 - settings.minScale);
        const tilt = -side * (1 - focus) * settings.tiltDeg;
        const depth = -settings.depthPx * (1 - focus);
        const naturalWidth = img?.naturalWidth || baseWidth;
        const naturalHeight = img?.naturalHeight || baseHeight;
        const ratio = naturalWidth / Math.max(1, naturalHeight);
        const maxWidth = settings.compact ? baseWidth : Math.max(96, baseWidth * scale);
        const maxHeight = settings.compact ? baseHeight : Math.max(96, baseHeight * scale);
        const layoutWidth = settings.compact
          ? baseWidth
          : Math.max(96, Math.min(maxWidth, maxHeight * ratio));
        layoutWidths[index] = layoutWidth;

        setStyleVar(card, "--card-scale", String(scale));
        setStyleVar(card, "--card-render-scale", String(settings.compact ? scale : 1));
        setStyleVar(card, "--card-max-width", `${maxWidth}px`);
        setStyleVar(card, "--card-max-height", `${maxHeight}px`);
        setStyleVar(card, "--card-layout-width", `${layoutWidth}px`);
        setStyleVar(card, "--card-tilt", `${tilt.toFixed(2)}deg`);
        setStyleVar(card, "--card-depth", `${depth.toFixed(2)}px`);
        setStyleVar(card, "--card-z", String(Math.round(scale * 100)));
      });

      const firstWidth = layoutWidths[0] || baseWidth;
      const lastWidth = layoutWidths[layoutWidths.length - 1] || firstWidth;
      if (!settings.compact) {
        setStyleVar(track, "--track-pad-start", `${Math.max(24, window.innerWidth / 2 - firstWidth / 2)}px`);
        setStyleVar(track, "--track-pad-end", `${Math.max(24, window.innerWidth / 2 - lastWidth / 2)}px`);
      }
    }

    function scheduleDetailCardsUpdate() {
      if (state.detailTicking) return;
      state.detailTicking = true;
      requestAnimationFrame(() => {
        updateDetailCards();
        state.detailTicking = false;
      });
    }

    function updateDetailVisuals() {
      updateDetailProgress();
      updateDetailCards();
    }

    function captureDetailStartVisuals(track) {
      const settings = getDetailMotionSettings();
      return Array.from(track.querySelectorAll(".photo-card")).map(card => {
        const style = getComputedStyle(card);
        const scale = Number(style.getPropertyValue("--card-scale")) || settings.minScale;
        const focus = clamp01((scale - settings.minScale) / (1 - settings.minScale));
        const tilt = parseFloat(style.getPropertyValue("--card-tilt")) || 0;
        const side = Math.abs(1 - focus) > .001 && settings.tiltDeg
          ? Math.max(-1, Math.min(-tilt / ((1 - focus) * settings.tiltDeg), 1))
          : 0;

        return { focus, side };
      });
    }

    function clearDetailFocusLock({ refresh = true } = {}) {
      window.clearTimeout(state.detailFocusTimer);
      state.detailFocusTimer = 0;
      if (state.detailFrame) {
        cancelAnimationFrame(state.detailFrame);
        state.detailFrame = 0;
      }
      state.detailMotion = "idle";
      els.detail.querySelector(".photo-track")?.classList.remove("is-animating");
      state.detailFocusIndex = null;
      state.detailClickProgress = 1;
      state.detailStartVisuals = [];
      if (refresh) updateDetailCards();
    }

    function centerDetailCard(card, behavior = "smooth") {
      const track = els.detail.querySelector(".photo-track");
      if (!track || !card) return;

      if (state.detailFrame) {
        cancelAnimationFrame(state.detailFrame);
        state.detailFrame = 0;
      }

      const targetIndex = Number(card.dataset.photoIndex);
      if (!Number.isInteger(targetIndex)) return;
      state.detailMotion = "click";

      window.clearTimeout(state.detailFocusTimer);
      updateDetailCards();
      state.detailStartVisuals = captureDetailStartVisuals(track);
      state.detailFocusIndex = targetIndex;
      state.detailClickProgress = 0;
      track.classList.add("is-animating");

      const startLeft = track.scrollLeft;
      const duration = behavior === "auto" ? 1 : MOTION.photoClickMs;
      const startedAt = performance.now();
      const smoothStep = value => value * value * (3 - 2 * value);

      const step = now => {
        if (state.detailMotion !== "click" || !state.detailOpen || state.detailFocusIndex !== targetIndex) {
          track.classList.remove("is-animating");
          state.detailFrame = 0;
          return;
        }

        const progress = clamp01((now - startedAt) / duration);
        state.detailClickProgress = progress;
        updateDetailCards();

        const focusedCard = track.querySelector(`.photo-card[data-photo-index="${targetIndex}"]`);
        if (!focusedCard) {
          track.classList.remove("is-animating");
          state.detailFrame = 0;
          return;
        }

        const trackRect = track.getBoundingClientRect();
        const cardRect = focusedCard.getBoundingClientRect();
        const trackCenter = trackRect.left + trackRect.width / 2;
        const cardCenter = cardRect.left + cardRect.width / 2;
        const maxLeft = Math.max(0, track.scrollWidth - track.clientWidth);
        const targetLeft = Math.max(0, Math.min(track.scrollLeft + cardCenter - trackCenter, maxLeft));
        const scrollProgress = smoothStep(progress);
        const nextLeft = startLeft + (targetLeft - startLeft) * scrollProgress;

        state.detailTargetScrollLeft = nextLeft;
        track.scrollLeft = nextLeft;
        updateDetailCards();

        if (progress < 1) {
          state.detailFrame = requestAnimationFrame(step);
          return;
        }

        state.detailClickProgress = 1;
        updateDetailCards();
        const finalRect = focusedCard.getBoundingClientRect();
        const finalTrackRect = track.getBoundingClientRect();
        const finalLeft = Math.max(0, Math.min(
          track.scrollLeft + finalRect.left + finalRect.width / 2 - (finalTrackRect.left + finalTrackRect.width / 2),
          Math.max(0, track.scrollWidth - track.clientWidth)
        ));
        state.detailTargetScrollLeft = finalLeft;
        track.scrollLeft = finalLeft;
        state.detailFocusIndex = null;
        state.detailClickProgress = 1;
        state.detailStartVisuals = [];
        track.classList.remove("is-animating");
        state.detailFrame = 0;
        state.detailMotion = "idle";
        updateDetailCards();
      };

      state.detailFrame = requestAnimationFrame(step);
    }

    function closestDetailCardToX(track, clientX) {
      let closestCard = null;
      let closestDistance = Number.POSITIVE_INFINITY;

      track.querySelectorAll(".photo-card").forEach(card => {
        const rect = card.getBoundingClientRect();
        const distance = Math.abs(rect.left + rect.width / 2 - clientX);
        if (distance < closestDistance) {
          closestDistance = distance;
          closestCard = card;
        }
      });

      return closestCard;
    }

    function clampScrollLeft(value) {
      const maxLeft = Math.max(0, els.stage.scrollWidth - els.stage.clientWidth);
      return Math.max(0, Math.min(value, maxLeft));
    }

    function scrollLeftForTrip(index) {
      const node = els.rail.querySelector(`.trip-node[data-index="${index}"]`);
      if (!node) return els.stage.scrollLeft;
      const stageRect = els.stage.getBoundingClientRect();
      const nodeRect = node.getBoundingClientRect();
      const nodeCenter = nodeRect.left + nodeRect.width / 2;
      const stageCenter = stageRect.left + stageRect.width / 2;
      return clampScrollLeft(els.stage.scrollLeft + nodeCenter - stageCenter);
    }

    function updateFocus() {
      const nodes = Array.from(els.rail.querySelectorAll(".trip-node"));
      if (!nodes.length) return;

      const stageRect = els.stage.getBoundingClientRect();
      const centerX = stageRect.left + stageRect.width / 2;
      const fadeRange = Math.max(1, stageRect.width * .48);
      let bestIndex = 0;
      let bestDistance = Number.POSITIVE_INFINITY;
      const measurements = nodes.map((node, index) => {
        const rect = node.getBoundingClientRect();
        const distance = Math.abs(rect.left + rect.width / 2 - centerX);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestIndex = index;
        }
        return { node, index, distance };
      });

      const overviewVisible = stageRect.bottom > 0 && stageRect.top < window.innerHeight;
      if (overviewVisible && !state.centeringSelected && bestIndex !== state.activeIndex) {
        state.activeIndex = bestIndex;
        updateAmbient();
      }

      const selectedMeasurement = measurements.find(item => item.index === state.selectedIndex);
      const selectedAwayFromCenter = selectedMeasurement && selectedMeasurement.distance > Math.min(96, stageRect.width * .08);
      if (state.railCloseOnDrift && !state.centeringSelected && state.selectedIndex !== null && (bestIndex !== state.selectedIndex || selectedAwayFromCenter)) {
        state.railCloseOnDrift = false;
        closeDetail({ scrollTop: false, refreshFocus: false });
      }

      measurements.forEach(({ node, index, distance }) => {
        const focus = Math.max(0, 1 - distance / fadeRange);
        const eased = Math.pow(focus, .72);
        node.style.setProperty("--node-opacity", String(.1 + eased * .9));
        node.style.setProperty("--node-scale", String(.78 + eased * .26));
        node.classList.toggle("is-focused", state.selectedIndex === null && index === state.activeIndex && overviewVisible);
        node.classList.toggle("is-selected", index === state.selectedIndex);
        node.setAttribute("aria-current", String(index === state.activeIndex));
      });
    }

    function updateAmbient() {
      const trip = state.trips[state.activeIndex];
      if (!trip) return;
      els.ambient.style.setProperty("--ambient-image", `url("${trip.images[0]}")`);
    }

    function stopRailMotion() {
      if (state.railFrame) {
        cancelAnimationFrame(state.railFrame);
        state.railFrame = 0;
      }
      state.railMotion = "idle";
    }

    function flushRailScroll() {
      if (state.railMotion !== "follow") {
        state.railFrame = 0;
        return;
      }

      const distance = state.targetScrollLeft - els.stage.scrollLeft;
      if (Math.abs(distance) <= MOTION.settlePx) {
        els.stage.scrollLeft = state.targetScrollLeft;
        state.railFrame = 0;
        state.railMotion = "idle";
        updateFocus();
        return;
      }

      els.stage.scrollLeft += distance * MOTION.wheelFollow;
      updateFocus();
      state.railFrame = requestAnimationFrame(flushRailScroll);
    }

    function animateRailTo(left, duration = MOTION.tripClickMs) {
      stopRailMotion();
      const startLeft = els.stage.scrollLeft;
      const targetLeft = clampScrollLeft(left);
      const startedAt = performance.now();
      state.targetScrollLeft = targetLeft;
      state.railMotion = "animate";

      const step = now => {
        if (state.railMotion !== "animate") {
          state.railFrame = 0;
          return;
        }

        const progress = smooth01((now - startedAt) / duration);
        els.stage.scrollLeft = startLeft + (targetLeft - startLeft) * progress;
        updateFocus();

        if (progress < 1) {
          state.railFrame = requestAnimationFrame(step);
          return;
        }

        els.stage.scrollLeft = targetLeft;
        state.railFrame = 0;
        state.railMotion = "idle";
        updateFocus();
      };

      state.railFrame = requestAnimationFrame(step);
    }

    function animatePageTo(top, duration = MOTION.tripClickMs, onComplete) {
      if (state.pageFrame) {
        cancelAnimationFrame(state.pageFrame);
        state.pageFrame = 0;
      }

      const startTop = window.scrollY;
      const targetTop = Math.max(0, top);
      const startedAt = performance.now();

      const step = now => {
        const progress = smooth01((now - startedAt) / duration);
        window.scrollTo({ top: startTop + (targetTop - startTop) * progress });
        updateDetailProgress();

        if (progress < 1) {
          state.pageFrame = requestAnimationFrame(step);
          return;
        }

        window.scrollTo({ top: targetTop });
        state.pageFrame = 0;
        updateDetailVisuals();
        if (onComplete) onComplete();
      };

      state.pageFrame = requestAnimationFrame(step);
    }

    function glideTo(left, behavior = "auto") {
      state.targetScrollLeft = clampScrollLeft(left);
      if (behavior === "smooth") {
        animateRailTo(state.targetScrollLeft);
        return;
      }
      if (state.railMotion !== "follow") {
        stopRailMotion();
        state.railMotion = "follow";
        state.railFrame = requestAnimationFrame(flushRailScroll);
      }
    }

    function normalizeWheelDelta(event) {
      const primaryDelta = Math.abs(event.deltaY) >= Math.abs(event.deltaX) ? event.deltaY : event.deltaX;
      const modeFactor = event.deltaMode === 1 ? 24 : event.deltaMode === 2 ? els.stage.clientWidth : 1;
      const pixelDelta = primaryDelta * modeFactor;
      return Math.max(-220, Math.min(pixelDelta, 220));
    }

    function isInRailZone(event) {
      const y = Number.isFinite(event.clientY) ? event.clientY : state.mouseY;
      return y >= window.innerHeight / 6 && y <= window.innerHeight * 5 / 6;
    }

    function isOverviewVisible() {
      const rect = els.overview.getBoundingClientRect();
      return rect.bottom > 0 && rect.top < window.innerHeight;
    }

    function selectTrip(index = state.activeIndex) {
      window.clearTimeout(state.openFrame);
      if (state.pageFrame) {
        cancelAnimationFrame(state.pageFrame);
        state.pageFrame = 0;
      }
      const nextIndex = Math.max(0, Math.min(index, state.trips.length - 1));
      state.activeIndex = nextIndex;
      state.selectedIndex = nextIndex;
      state.railCloseOnDrift = false;
      clearDetailFocusLock({ refresh: false });
      state.detailOpen = true;
      state.centeringSelected = true;
      state.detailTargetScrollLeft = 0;
      updateAmbient();
      renderDetail();
      requestAnimationFrame(() => {
        animateRailTo(scrollLeftForTrip(nextIndex), MOTION.tripClickMs);
        animatePageTo(els.detail.offsetTop, MOTION.tripClickMs, () => {
          state.centeringSelected = false;
          state.activeIndex = nextIndex;
          state.selectedIndex = nextIndex;
          updateAmbient();
          updateFocus();
        });
      });
    }

    function closeDetail({ scrollTop = false, refreshFocus = true } = {}) {
      window.clearTimeout(state.openFrame);
      if (state.pageFrame) {
        cancelAnimationFrame(state.pageFrame);
        state.pageFrame = 0;
      }
      state.centeringSelected = false;
      state.detailOpen = false;
      state.selectedIndex = null;
      state.railCloseOnDrift = false;
      clearDetailFocusLock({ refresh: false });
      state.detailTargetScrollLeft = 0;
      renderDetail();
      if (refreshFocus) updateFocus();
      if (scrollTop) animatePageTo(0, MOTION.tripClickMs);
    }

    function flushDetailScroll() {
      const track = els.detail.querySelector(".photo-track");
      if (!track || state.detailMotion !== "follow") {
        state.detailFrame = 0;
        return;
      }

      const distance = state.detailTargetScrollLeft - track.scrollLeft;
      if (Math.abs(distance) <= MOTION.settlePx) {
        track.scrollLeft = state.detailTargetScrollLeft;
        updateDetailCards();
        state.detailFrame = 0;
        state.detailMotion = "idle";
        return;
      }

      track.scrollLeft += distance * MOTION.wheelFollow;
      updateDetailCards();
      state.detailFrame = requestAnimationFrame(flushDetailScroll);
    }

    function scrollDetailTrack(delta = 0) {
      const track = els.detail.querySelector(".photo-track");
      if (!track) return;
      if (state.detailMotion !== "follow" || state.detailFocusIndex !== null) {
        clearDetailFocusLock({ refresh: false });
      }
      const maxLeft = Math.max(0, track.scrollWidth - track.clientWidth);
      const base = state.detailMotion === "follow" ? state.detailTargetScrollLeft : track.scrollLeft;
      state.detailTargetScrollLeft = Math.max(0, Math.min(base + delta, maxLeft));
      if (state.detailMotion !== "follow") {
        state.detailMotion = "follow";
        state.detailFrame = requestAnimationFrame(flushDetailScroll);
      }
    }

    function bindEvents() {
      window.addEventListener("mousemove", event => {
        state.mouseX = event.clientX;
        state.mouseY = event.clientY;
        updateHoveredNode(event.clientX, event.clientY);
      });

      els.detail.addEventListener("wheel", event => {
        const target = event.target instanceof Element ? event.target : null;
        const track = target?.closest(".photo-track");
        const inPhotoTrack = track && els.detail.contains(track);
        const inDetailView = state.detailOpen && window.scrollY >= els.detail.offsetTop - 12;
        if (!inPhotoTrack || !inDetailView) return;
        const delta = normalizeWheelDelta(event);
        if (delta < 0 && track.scrollLeft <= 2) return;
        event.preventDefault();
        event.stopPropagation();
        scrollDetailTrack(delta);
      }, { passive: false });

      window.addEventListener("wheel", event => {
        const overviewVisible = isOverviewVisible();
        const overviewRect = els.overview.getBoundingClientRect();
        const pointerY = Number.isFinite(event.clientY) ? event.clientY : state.mouseY;
        const pointerInOverview = pointerY >= overviewRect.top && pointerY <= overviewRect.bottom;
        if (overviewVisible && pointerInOverview && isInRailZone(event)) {
          event.preventDefault();
          state.centeringSelected = false;
          state.railCloseOnDrift = state.detailOpen && state.selectedIndex !== null;
          const delta = normalizeWheelDelta(event);
          const base = state.railMotion === "follow" ? state.targetScrollLeft : els.stage.scrollLeft;
          glideTo(base + delta);
          return;
        }

        if (state.detailOpen && window.scrollY < 12 && event.deltaY > 0) {
          return;
        }
      }, { passive: false });

      els.stage.addEventListener("scroll", () => {
        if (state.ticking) return;
        state.ticking = true;
        requestAnimationFrame(() => {
          updateFocus();
          updateHoveredNode(state.mouseX, state.mouseY);
          state.ticking = false;
        });
      });

      window.addEventListener("scroll", () => {
        updateFocus();
        updateDetailVisuals();
      });
      window.addEventListener("resize", () => {
        updateFocus();
        updateDetailVisuals();
      });
    }

    async function loadData() {
      let data = fallbackData;
      try {
        const response = await fetch("data/trips.json", { cache: "no-store" });
        if (response.ok) data = await response.json();
      } catch (error) {
        data = fallbackData;
      }

      state.trips = (data.trips || []).map(normalizeTrip);
      renderRail();
      renderDetail();
      updateAmbient();
      requestAnimationFrame(() => {
        updateFocus();
        updateDetailVisuals();
      });
    }

    bindEvents();
    loadData();
  </script>
</body>
</html>
